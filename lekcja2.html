<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szczelinka – Lekcja 2</title>

<style>

body{
font-family:Arial;
margin:0;
background:#ffffff;
color:#222;
}

.container{
max-width:850px;
margin:auto;
padding:40px;
}

h1{
color:#3aa7d6;
}

.buttons{
margin-top:40px;
display:flex;
gap:20px;
}

button{
padding:14px 28px;
border:none;
border-radius:10px;
background:#3aa7d6;
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#bbb;
cursor:default;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
}

.timer{
font-size:18px;
margin-top:20px;
color:#3aa7d6;
}

img{
max-width:400px;
margin:20px auto;
display:block;
}

</style>
</head>

<body>

<div class="container">

<h1>Lekcja 2</h1>

<div id="content"></div>

<div class="timer" id="timer"></div>

<div class="buttons">
<button onclick="back()">Wstecz</button>
<button id="nextBtn" onclick="next()">Dalej</button>
</div>

</div>


<div class="popup" id="popup">
<div class="popup-box" id="popupContent"></div>
</div>



<script>

let step=0
let timerRunning=false
let timer=60
let cheat=false

let name=localStorage.getItem("userName") || ""

function saveProgress(){
document.cookie="lesson2="+step
}

function getProgress(){
let cookies=document.cookie.split(";")
for(let c of cookies){
if(c.includes("lesson2")){
return parseInt(c.split("=")[1])
}
}
return null
}

function askResume(){
let saved=getProgress()

if(saved!==null){

popup(`
<h3>Witaj ${name}</h3>
<p>Chcesz kontynuować od miejsca gdzie skończyłeś?</p>

<button onclick="resume(${saved})">Kontynuuj</button>
<button onclick="resume(0)">Od początku</button>
`)
}
else{
render()
}
}

function resume(s){
step=s
closePopup()
render()
}

function popup(html){
document.getElementById("popup").style.display="flex"
document.getElementById("popupContent").innerHTML=html
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function render(){

saveProgress()

let text=""
let nextBtn=document.getElementById("nextBtn")
nextBtn.disabled=false

document.getElementById("timer").innerHTML=""

if(step==0){

text=`

<h2>Lekcja 2.0</h2>

<p><b>W ramach Lekcji 1 poznaliśmy 2 Prawdy Nie-do-podważenia:</b></p>

<ol>
<li>Jesteśmy na misji osiągnięcia szczęścia.</li>
<li>Szukamy szczęścia w świecie, jednak świat nie może dać trwałego szczęścia.</li>
</ol>

`

}

if(step==1){

text=`

<h2>Lekcja 2.1</h2>

<p>
Szczelinka to stan intensywnej obecności przy jednoczesnym całkowitym braku myśli.
</p>

<p>
Zadaj sobie pytanie:
</p>

<h3>KIM JESTEŚ?</h3>

<p>Zastanów się przez chwilę.</p>

`

nextBtn.disabled=true
startTimer()

}

if(step==2){

text=`

<h2>Lekcja 2.2</h2>

<p>Większość osób odpowie:</p>

<ul>
<li>Jestem swoim zawodem</li>
<li>Jestem rolą w rodzinie</li>
<li>Jestem swoim imieniem i historią</li>
<li>Jestem charakterem</li>
<li>Jestem przekonaniami</li>
<li>Jestem swoim ciałem</li>
</ul>

<p>

Jednak wszystkie te odpowiedzi można podważyć.

Zawód się zmienia.
Charakter się zmienia.
Przekonania się zmieniają.

</p>

<p>

Nie jesteś również swoim ciałem.

Jeśli stracisz rękę nadal jesteś sobą.
Jeśli stracisz nogę nadal jesteś sobą.

</p>

<p>

Jeśli żadna część ciała nie jest tobą,
to suma części również tobą nie jest.

</p>

`

}

if(step==3){

text=`

<h2>Lekcja 2.3</h2>

<p>Kolejne odpowiedzi które padają:</p>

<ul>
<li>Jestem swoim umysłem</li>
<li>Jestem duszą</li>
</ul>

<p>Spójrz na sytuację w umyśle:</p>

<img src="glowy.png">

<p>

W Twojej głowie istnieje głos – <b>Ten Który Mówi (TKM)</b>.

</p>

<p>

Jednak istnieje też ktoś inny…

<b>Ten Który Słucha (TKS)</b>.

</p>

<p>

Jeśli głos jest słyszany,
musi istnieć ktoś kto go słucha.

</p>

<p>

TKM pojawia się i znika.

TKS jest obecny zawsze.

</p>

`

}

document.getElementById("content").innerHTML=text

}

function startTimer(){

timerRunning=true
timer=60

document.getElementById("timer").innerHTML="Czas refleksji: "+timer

let interval=setInterval(()=>{

if(cheat){
clearInterval(interval)
document.getElementById("nextBtn").disabled=false
document.getElementById("timer").innerHTML=""
return
}

timer--

document.getElementById("timer").innerHTML="Czas refleksji: "+timer

if(timer<=0){
clearInterval(interval)
document.getElementById("nextBtn").disabled=false
document.getElementById("timer").innerHTML=""
}

},1000)

}

function next(){

if(step==0){

popup(`

<h3>Czy wykonałeś pracę domową z lekcji 1.18?</h3>

<p>
Praca domowa:
Wykonaj 5 sesji medytacji liczenia oddechów.
Każda po 5 minut.
</p>

<button onclick="closePopup();step++;render()">TAK</button>

<button onclick="closePopup()">NIE</button>

`)

return
}

step++

if(step>3){
window.location="Main_Page.html"
return
}

render()

}

function back(){
if(step>0){
step--
render()
}
}

document.addEventListener("keydown",e=>{
if(e.ctrlKey && e.key==="d"){
cheat=true
}
})

askResume()

</script>

</body>
</html>
