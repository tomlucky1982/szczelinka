<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<title>Lekcja 3</title>

<style>

body{
font-family: Georgia, serif;
background:#f4f6f8;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px;
}

.loginBox{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:80%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 25px;
font-size:16px;
cursor:pointer;
}

#lessonContent{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<h1>Lekcja 3</h1>

<div id="loginBox" class="loginBox">

<h2>🔒 Dostęp do lekcji</h2>

<input id="login" placeholder="login">
<br>

<input id="password" type="password" placeholder="hasło">
<br>

<button onclick="checkLogin()">Wejdź</button>

<p id="msg"></p>

</div>

<div id="lessonContent" style="display:none"></div>

</div>

<script type="module">

import { supabase } from './supabase-client.js'

window.checkLogin = async function(){

const login = document.getElementById('login').value
const password = document.getElementById('password').value

const { data, error } = await supabase
.from('lesson_credentials')
.select('*')
.eq('login', login)
.eq('password_plain', password)

if(error){
document.getElementById('msg').innerText = error.message
return
}

if(!data || data.length === 0){
document.getElementById('msg').innerText = "Błędny login lub hasło"
return
}

const credential = data[0]

if(credential.lesson_id != 1){
document.getElementById('msg').innerText = "Brak dostępu do tej lekcji"
return
}

loadLesson()

}

async function loadLesson(){

document.getElementById('loginBox').style.display = "none"

const { data } = await supabase
.from('lesson_content')
.select('*')
.eq('lesson_id',1)

document.getElementById('lessonContent').innerHTML = data[0].html_content
document.getElementById('lessonContent').style.display = "block"

}

</script>

</body>
</html>
