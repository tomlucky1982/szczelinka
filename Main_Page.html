<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Szczelinka — Main Page</title>
  <link rel="icon" href="favicon_minimal.ico" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #1f1f1f;
      font-family: Arial, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 92px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .menu a {
      text-decoration: none;
      color: #1f1f1f;
      font-size: 17px;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .menu a:hover {
      color: #3aa7d6;
    }

    .logo-small {
      height: 58px;
      width: auto;
      display: block;
    }

    .content {
      min-height: 200vh;
      padding: 48px 34px 120px;
      background: #ffffff;
    }

    .placeholder {
      max-width: 900px;
      margin: 0 auto;
      min-height: 1200px;
    }

    @media (max-width: 700px) {
      .topbar {
        height: 82px;
        padding: 0 18px;
      }

      .menu {
        gap: 18px;
      }

      .menu a {
        font-size: 15px;
      }

      .logo-small {
        height: 46px;
      }

      .content {
        padding: 32px 18px 90px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="menu">
      <a href="#">Lekcje</a>
      <a href="#">Zajęcia</a>
    </nav>

    <img src="logo.png" alt="Szczelinka" class="logo-small" />
  </header>

  <main class="content">
    <div class="placeholder">
      <!-- Na razie pusto -->
    </div>
  </main>
</body>
</html>
