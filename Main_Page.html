<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Szczelinka</title>

<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:white;
}

/* GÓRNA BELKA */

.topbar{
position:sticky;
top:0;
background:white;
height:80px;
display:flex;
align-items:center;
padding:0 40px;
border-bottom:1px solid rgba(0,0,0,0.08);
z-index:1000;
}

/* LOGO */

.logo{
height:125px;
margin-right:40px;
}

/* MENU */

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
font-size:18px;
color:#3aa7d6;
font-weight:500;
padding-bottom:4px;
}

/* aktywna zakładka */

.menu a.active{
border-bottom:2px solid #3aa7d6;
}

/* zawartość strony */

.content{
padding:60px 40px;
min-height:200vh;
}

</style>
</head>

<body>

<header class="topbar">

<img src="logo.png" class="logo">

<nav class="menu">
<a class="active" href="#">Lekcje</a>
<a href="#">Zajęcia</a>
</nav>

</header>

<div class="content">

<!-- na razie pusto -->

</div>

</body>
</html>
