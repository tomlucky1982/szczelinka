PE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lekcja 4</title>
  <link rel="icon" href="favicon_minimal.ico">
  <meta name="theme-color" content="#3aa7d6">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #1f1f1f;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 150px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .topbar-left {
      display: flex;
      align-items: center;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      height: 125px;
      margin-right: 50px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .menu > a,
    .dropdown > a,
    .contact-link,
    .logout-link {
      text-decoration: none;
      font-size: 18px;
      color: #3aa7d6;
      font-weight: 500;
      padding-bottom: 6px;
      display: inline-block;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .menu > a.active {
      border-bottom: 2px solid #3aa7d6;
    }

</html>
