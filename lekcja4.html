<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 4</title>
</head>
<body>

<h2>Logowanie do lekcji 4</h2>

<input id="login" placeholder="login">
<input id="password" type="password" placeholder="hasło">
<button onclick="checkLogin()">Wejdź</button>

<p id="msg"></p>

<div id="lessonContent" style="display:none;"></div>

<script type="module">
import { supabase } from './supabase-client.js'

const LESSON_NO = 4

async function getLessonId() {
  const { data } = await supabase.from('lessons').select('*')
  const lesson = data.find(l => String(l.lesson_no) === "4" || String(l.number) === "4")
  return lesson.id
}

async function loadLesson() {
  const lessonId = await getLessonId()

  const { data } = await supabase
    .from('lesson_content')
    .select('html_content')
    .eq('lesson_id', lessonId)
    .single()

  document.getElementById("lessonContent").innerHTML = data.html_content
  document.getElementById("lessonContent").style.display = "block"
}

window.checkLogin = async function () {
  const login = document.getElementById('login').value.trim()
  const password = document.getElementById('password').value

  if (!login || !password) {
    msg.innerText = "Podaj login i hasło"
    return
  }

  const lessonId = await getLessonId()

  const { data } = await supabase
    .from('lesson_credentials')
    .select('*')
    .eq('lesson_id', lessonId)
    .eq('login', login)
    .eq('password_plain', password)
    .eq('is_active', true)

  if (!data.length) {
    msg.innerText = "Brak dostępu"
    return
  }

  await loadLesson()
}
</script>

</body>
</html>
