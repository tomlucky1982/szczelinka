<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szczelinka - panel zarządzania</title>

<style>

body{
font-family: Georgia, serif;
background:#f4f6f8;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

input{
width:400px;
padding:10px;
margin:5px 0;
}

button{
padding:10px 20px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f1f1f1;
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div class="container">

<h1>Panel zarządzania</h1>

<div id="loginSection" class="card">

<h2>Logowanie admina</h2>

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="hasło"><br>

<button onclick="login()">Zaloguj</button>

<p id="msg"></p>

</div>

<div id="adminSection" class="hidden">

<div class="card">

<h2>Zalogowano poprawnie</h2>

<button onclick="logout()">Wyloguj</button>

</div>

<div class="card">

<h2>Dodaj dostęp do lekcji</h2>

<input id="displayName" placeholder="Nazwa użytkownika"><br>
<input id="userLogin" placeholder="Login"><br>
<input id="userPassword" placeholder="Hasło"><br>

<h3>Dostęp do lekcji</h3>

<label><input type="checkbox" class="lessonBox" value="3"> Lekcja 3</label><br>
<label><input type="checkbox" class="lessonBox" value="4"> Lekcja 4</label><br>
<label><input type="checkbox" class="lessonBox" value="5"> Lekcja 5</label><br>
<label><input type="checkbox" class="lessonBox" value="6"> Lekcja 6</label><br>
<label><input type="checkbox" class="lessonBox" value="7"> Lekcja 7</label><br>
<label><input type="checkbox" class="lessonBox" value="8"> Lekcja 8</label><br><br>

<button onclick="createAccess()">Utwórz dostęp</button>

<p id="createMsg"></p>

</div>

<div class="card">

<h2>Statystyki wejść</h2>

<button onclick="loadStats()">Odśwież statystyki</button>

<div id="statsBox"></div>

</div>

</div>

</div>

<script type="module">

import { supabase } from './supabase-client.js'

const loginSection=document.getElementById('loginSection')
const adminSection=document.getElementById('adminSection')

async function checkSession(){

const {data}=await supabase.auth.getSession()

if(data.session){
loginSection.classList.add('hidden')
adminSection.classList.remove('hidden')
loadStats()
}
else{
loginSection.classList.remove('hidden')
adminSection.classList.add('hidden')
}

}

window.login=async function(){

const email=document.getElementById('email').value
const password=document.getElementById('password').value

const {error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){
document.getElementById('msg').innerText=error.message
}
else{
checkSession()
}

}

window.logout=async function(){

await supabase.auth.signOut()
checkSession()

}

window.createAccess=async function(){

const displayName=document.getElementById('displayName').value
const login=document.getElementById('userLogin').value
const password=document.getElementById('userPassword').value

const selectedLessons=Array.from(document.querySelectorAll('.lessonBox:checked'))
.map(el=>parseInt(el.value))

if(!displayName||!login||!password||selectedLessons.length===0){
document.getElementById('createMsg').innerText="Uzupełnij wszystkie pola"
return
}

const {data:account}=await supabase
.from('access_accounts')
.insert([{display_name:displayName}])
.select()

const accountId=account[0].id

const {data:lessons}=await supabase
.from('lessons')
.select()
.in('lesson_no',selectedLessons)

const rows=lessons.map(l=>({
account_id:accountId,
lesson_id:l.id,
login:login,
password_plain:password
}))

await supabase
.from('lesson_credentials')
.insert(rows)

document.getElementById('createMsg').innerText="Dostęp zapisany"

}

window.loadStats=async function(){

const statsBox=document.getElementById('statsBox')

const {data}=await supabase
.from('lesson_access_events')
.select(`
viewed_at,
event_type,
lesson_id,
lesson_credentials(login),
lessons(lesson_no),
user_agent
`)
.order('viewed_at',{ascending:false})
.limit(100)

let html=`<table>
<tr>
<th>Data</th>
<th>Login</th>
<th>Lekcja</th>
<th>Typ</th>
<th>Przeglądarka</th>
</tr>`

data.forEach(row=>{

html+=`
<tr>
<td>${new Date(row.viewed_at).toLocaleString()}</td>
<td>${row.lesson_credentials?.login||""}</td>
<td>${row.lessons?.lesson_no||""}</td>
<td>${row.event_type}</td>
<td>${row.user_agent||""}</td>
</tr>
`

})

html+=`</table>`

statsBox.innerHTML=html

}

checkSession()

</script>

</body>
</html>
