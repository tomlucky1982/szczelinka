<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Szczelinka - panel zarządzania</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px 60px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 24px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      max-width: 420px;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .lessons-grid label {
      display: block;
      margin-bottom: 8px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .message {
      margin-top: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 800px;
      background: white;
    }

    th, td {
      border: 1px solid #d9d9d9;
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f1f1f1;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Panel zarządzania</h1>

    <div id="loginSection" class="card">
      <h2>Logowanie admina</h2>

      <input id="email" type="email" placeholder="email admina" />
      <br>

      <input id="password" type="password" placeholder="hasło" />
      <br>

      <button onclick="login()">Zaloguj</button>

      <p id="msg" class="message"></p>
    </div>

    <div id="adminSection" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom: 6px;">Zalogowano poprawnie</h2>
            <div class="muted">Tutaj zarządzasz dostępami do lekcji i sprawdzasz wejścia.</div>
          </div>
          <button onclick="logout()">Wyloguj</button>
        </div>
      </div>

      <div class="card">
        <h2>Dodaj dostęp do lekcji</h2>

        <input id="displayName" type="text" placeholder="Nazwa użytkownika np. Jan Kowalski" />
        <br>

        <input id="userLogin" type="text" placeholder="Login" />
        <br>

        <input id="userPassword" type="text" placeholder="Hasło" />
        <br>

        <h3>Dostęp do lekcji</h3>

        <div class="lessons-grid">
          <label><input type="checkbox" class="lessonBox" value="3"> Lekcja 3</label>
          <label><input type="checkbox" class="lessonBox" value="4"> Lekcja 4</label>
          <label><input type="checkbox" class="lessonBox" value="5"> Lekcja 5</label>
          <label><input type="checkbox" class="lessonBox" value="6"> Lekcja 6</label>
          <label><input type="checkbox" class="lessonBox" value="7"> Lekcja 7</label>
          <label><input type="checkbox" class="lessonBox" value="8"> Lekcja 8</label>
        </div>

        <button onclick="createAccess()">Utwórz dostęp</button>

        <p id="createMsg" class="message"></p>
      </div>

      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom: 6px;">Statystyki wejść</h2>
            <div class="muted">Ostatnie 100 zdarzeń logowania i wejść do lekcji.</div>
          </div>
          <button onclick="loadStats()">Odśwież statystyki</button>
        </div>

        <div id="statsBox" class="table-wrap"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-client.js'

    const loginSection = document.getElementById('loginSection')
    const adminSection = document.getElementById('adminSection')
    const msg = document.getElementById('msg')
    const createMsg = document.getElementById('createMsg')
    const statsBox = document.getElementById('statsBox')

    async function checkSession() {
      const { data, error } = await supabase.auth.getSession()

      if (error) {
        msg.innerText = 'Błąd sesji: ' + error.message
        loginSection.classList.remove('hidden')
        adminSection.classList.add('hidden')
        return
      }

      if (data.session) {
        loginSection.classList.add('hidden')
        adminSection.classList.remove('hidden')
        await loadStats()
      } else {
        loginSection.classList.remove('hidden')
        adminSection.classList.add('hidden')
      }
    }

    window.login = async function () {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      msg.innerText = ''

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        msg.innerText = 'Błąd logowania: ' + error.message
      } else {
        msg.innerText = 'Zalogowano poprawnie'
        await checkSession()
      }
    }

    window.logout = async function () {
      const { error } = await supabase.auth.signOut()

      if (error) {
        alert('Błąd wylogowania: ' + error.message)
      }

      await checkSession()
    }

    window.createAccess = async function () {
      const displayName = document.getElementById('displayName').value.trim()
      const login = document.getElementById('userLogin').value.trim()
      const password = document.getElementById('userPassword').value.trim()

      const selectedLessons = Array.from(document.querySelectorAll('.lessonBox:checked'))
        .map(el => parseInt(el.value, 10))

      createMsg.innerText = ''

      if (!displayName || !login || !password || selectedLessons.length === 0) {
        createMsg.innerText = 'Uzupełnij wszystkie pola i wybierz co najmniej jedną lekcję.'
        return
      }

      const { data: accountData, error: accountError } = await supabase
        .from('access_accounts')
        .insert([{ display_name: displayName }])
        .select()

      if (accountError) {
        createMsg.innerText = 'Błąd tworzenia użytkownika: ' + accountError.message
        return
      }

      const accountId = accountData[0].id

      const { data: lessonsData, error: lessonsError } = await supabase
        .from('lessons')
        .select('id, lesson_no')
        .in('lesson_no', selectedLessons)

      if (lessonsError) {
        createMsg.innerText = 'Błąd pobierania lekcji: ' + lessonsError.message
        return
      }

      const credentials = lessonsData.map(lesson => ({
        account_id: accountId,
        lesson_id: lesson.id,
        login: login,
        password_plain: password
      }))

      const { error: credentialsError } = await supabase
        .from('lesson_credentials')
        .insert(credentials)

      if (credentialsError) {
        createMsg.innerText = 'Błąd zapisu dostępów: ' + credentialsError.message
        return
      }

      createMsg.innerText = 'Dostęp zapisany.'

      document.getElementById('displayName').value = ''
      document.getElementById('userLogin').value = ''
      document.getElementById('userPassword').value = ''
      document.querySelectorAll('.lessonBox').forEach(el => {
        el.checked = false
      })

      await loadStats()
    }

    window.loadStats = async function () {
      statsBox.innerHTML = 'Ładowanie...'

      const { data, error } = await supabase
        .from('lesson_access_events')
        .select(`
          id,
          event_type,
          viewed_at,
          user_agent,
          lesson_id,
          lesson_credentials (
            login
          )
        `)
        .order('viewed_at', { ascending: false })
        .limit(100)

      if (error) {
        statsBox.innerHTML = 'Błąd ładowania statystyk: ' + error.message
        return
      }

      if (!data || data.length === 0) {
        statsBox.innerHTML = 'Brak statystyk.'
        return
      }

      let html = `
        <table>
          <tr>
            <th>Data</th>
            <th>Login</th>
            <th>Lekcja</th>
            <th>Typ</th>
            <th>User Agent</th>
          </tr>
      `

      data.forEach(row => {
        const login = row.lesson_credentials?.login || '-'

        html += `
          <tr>
            <td>${new Date(row.viewed_at).toLocaleString('pl-PL')}</td>
            <td>${login}</td>
            <td>${row.lesson_id}</td>
            <td>${row.event_type}</td>
            <td>${row.user_agent || ''}</td>
          </tr>
        `
      })

      html += `</table>`
      statsBox.innerHTML = html
    }

    checkSession()
  </script>
</body>
</html>
