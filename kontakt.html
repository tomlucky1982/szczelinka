<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #1f1f1f;
    }

    /* ===== MENU ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 150px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .topbar-left {
      display: flex;
      align-items: center;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      height: 125px;
      margin-right: 50px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .menu > a,
    .dropdown > a,
    .contact-link {
      text-decoration: none;
      font-size: 18px;
      color: #3aa7d6;
      font-weight: 500;
      padding-bottom: 6px;
    }

    .menu > a.active {
      border-bottom: 2px solid #3aa7d6;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 190px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      padding: 10px 0;
      z-index: 1100;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 18px;
      text-decoration: none;
      color: #3aa7d6;
      font-size: 16px;
    }

    .dropdown-content a:hover {
      background: rgba(58,167,214,0.07);
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* ===== SEKCJA ===== */
    .container {
      max-width: 900px;
      margin: 120px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 38px rgba(58,167,214,0.14);
      border: 1px solid rgba(58,167,214,0.12);
      padding: 50px 40px;
      text-align: center;
    }

    h1 {
      color: #3aa7d6;
      font-size: 42px;
      margin-bottom: 30px;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .role {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .contact-item {
      font-size: 20px;
      margin: 12px 0;
    }

    .contact-item a {
      color: #3aa7d6;
      text-decoration: none;
      font-weight: 600;
    }

    .contact-item a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .topbar {
        height: auto;
        padding: 18px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .logo {
        height: 90px;
        margin-right: 0;
        margin-bottom: 10px;
      }

      .menu {
        flex-wrap: wrap;
        gap: 18px;
      }

      .container {
        margin: 60px auto;
      }

      .card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

        </div>

        <a href="zajecia.html">Zajęcia</a>
        <a href="prowadzacy.html">Prowadzący</a>

    </div>

    <div class="topbar-right">
