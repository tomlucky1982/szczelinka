    * {

    body {
      margin: 0;

      display: flex;

    }

    .container {
      width: 260px;

    .enter-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 30px;
      background: #3aa7d6;
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;

    }

      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(58, 167, 214, 0.24);
      background: #2f9cca;
    }

    .enter-btn:active {
      transform: translateY(0);
    }
